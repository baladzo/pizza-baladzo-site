<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pizza Baladzo - Preview client</title>
  <meta name="description" content="Preview client Pizza Baladzo en maquettes exactes cliquables.">
  <meta name="theme-color" content="#050208">
  <link rel="icon" href="assets/logo-pizza-baladzo.svg" type="image/svg+xml">
  <style>
    :root{
      --bg:#050208;
      --violet:#b63cff;
      --violet-2:#e069ff;
      --panel:rgba(8,5,13,.93);
      --line:rgba(205,69,255,.72);
      --text:#fff;
      --muted:#d8c8e6;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050208;color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
    body{overflow-x:hidden}
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .app{
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      background:
        radial-gradient(circle at 77% 8%,rgba(188,54,255,.18),transparent 30rem),
        radial-gradient(circle at 21% 95%,rgba(255,112,28,.11),transparent 26rem),
        #050208;
    }
    .mockup{
      position:relative;
      width:min(100vw,var(--page-width));
      margin:0 auto;
      background:#050208;
      box-shadow:0 0 46px rgba(183,60,255,.22);
    }
    .mockup img{
      display:block;
      width:100%;
      height:auto;
      user-select:none;
      -webkit-user-drag:none;
    }
    .site-nav-overlay{
      position:absolute;
      left:24%;
      right:13%;
      top:2.2%;
      z-index:12;
      min-height:7.2%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:clamp(10px,1.6vw,34px);
      padding:10px 14px;
      border-bottom:1px solid rgba(184,60,255,.32);
      background:linear-gradient(180deg,rgba(5,2,8,.92),rgba(5,2,8,.72) 78%,rgba(5,2,8,0));
      backdrop-filter:blur(3px);
    }
    .nav-button{
      border:0;
      border-radius:0;
      background:transparent;
      color:#fff;
      padding:8px 4px;
      font-size:clamp(9px,1vw,18px);
      font-weight:900;
      line-height:1;
      text-transform:uppercase;
      white-space:nowrap;
      letter-spacing:0;
      text-shadow:0 0 8px rgba(0,0,0,.75);
    }
    .nav-button.active{
      color:var(--violet-2);
      box-shadow:0 2px 0 var(--violet-2);
    }
    .quick-actions-overlay{
      position:absolute;
      z-index:22;
      right:3.2%;
      top:2.3%;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .quick-actions-overlay button{
      border:1px solid rgba(218,97,255,.45);
      border-radius:8px;
      background:rgba(0,0,0,.24);
      color:white;
      min-height:36px;
      padding:0 12px;
      font-size:clamp(10px,.82vw,14px);
      font-weight:900;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow:0 0 12px rgba(0,0,0,.25);
    }
    .quick-actions-overlay button:hover,
    .quick-actions-overlay button.active{
      color:var(--violet-2);
      border-color:rgba(218,97,255,.85);
      box-shadow:0 0 16px rgba(183,60,255,.38);
    }
    .hotspot{
      position:absolute;
      left:calc(var(--x)*1%);
      top:calc(var(--y)*1% - .9%);
      width:calc(var(--w)*1%);
      height:calc(var(--h)*1% + 1.8%);
      border:0;
      padding:0;
      border-radius:8px;
      color:transparent;
      background:transparent;
      opacity:0;
      cursor:pointer;
    }
    .hotspot:hover{
      opacity:0;
    }
    .hotspot:focus-visible{
      opacity:1;
      outline:2px solid rgba(230,105,255,.55);
      outline-offset:2px;
      background:rgba(183,60,255,.08);
    }
    .selection-marker{
      position:absolute;
      left:calc(var(--x)*1%);
      top:calc(var(--y)*1%);
      width:calc(var(--w)*1%);
      height:calc(var(--h)*1%);
      pointer-events:none;
      border:2px solid rgba(245,188,255,.95);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(224,105,255,.62),rgba(142,38,219,.58));
      box-shadow:0 0 20px rgba(210,78,255,.62),inset 0 0 18px rgba(255,255,255,.12);
      mix-blend-mode:screen;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:20px;
      z-index:40;
      transform:translate(-50%,120%);
      width:min(520px,calc(100% - 28px));
      padding:14px 18px;
      border:1px solid var(--line);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(24,9,33,.97),rgba(8,5,13,.97));
      box-shadow:0 0 26px rgba(183,60,255,.35);
      text-align:center;
      font-weight:800;
      letter-spacing:.02em;
      transition:transform .22s ease;
    }
    .toast.show{transform:translate(-50%,0)}
    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:60;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(0,0,0,.76);
      backdrop-filter:blur(7px);
    }
    .modal-backdrop.open{display:flex}
    .modal{
      width:min(760px,100%);
      max-height:min(860px,92vh);
      overflow:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:
        linear-gradient(180deg,rgba(28,10,39,.94),rgba(7,4,12,.98)),
        url('assets/hero-accueil.png') center/cover;
      box-shadow:0 0 36px rgba(183,60,255,.44),0 26px 90px rgba(0,0,0,.72);
    }
    .modal-inner{padding:24px}
    .modal-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
    .modal h2,.modal h3{margin:0;text-transform:uppercase;letter-spacing:.04em}
    .modal h2 span,.price,.violet{color:var(--violet-2)}
    .close{
      width:42px;height:42px;border:1px solid var(--line);border-radius:8px;
      background:rgba(0,0,0,.45);color:white;font-size:24px;line-height:1
    }
    .grid{display:grid;gap:12px}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .field{display:grid;gap:6px;color:var(--muted);font-size:14px}
    .field input,.field textarea,.field select{
      width:100%;
      border:1px solid rgba(218,97,255,.55);
      border-radius:8px;
      background:rgba(0,0,0,.44);
      color:white;
      padding:12px 13px;
      outline:none;
    }
    .field textarea{min-height:96px;resize:vertical}
    .choice-row{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 16px}
    .choice{
      border:1px solid rgba(218,97,255,.55);
      border-radius:8px;
      background:rgba(0,0,0,.38);
      color:white;
      padding:10px 13px;
      font-weight:800;
    }
    .choice.active{background:linear-gradient(180deg,#d463ff,#8e26db);border-color:#f0b8ff}
    .primary{
      border:0;
      border-radius:8px;
      background:linear-gradient(180deg,#d463ff,#8e26db);
      color:white;
      padding:13px 18px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.03em;
      box-shadow:0 0 18px rgba(183,60,255,.34);
    }
    .secondary{
      border:1px solid rgba(218,97,255,.7);
      border-radius:8px;
      background:rgba(0,0,0,.4);
      color:white;
      padding:12px 16px;
      font-weight:800;
    }
    .list{display:grid;gap:10px}
    .line{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
      border:1px solid rgba(218,97,255,.36);
      border-radius:8px;
      background:rgba(0,0,0,.34);
      padding:12px;
    }
    .line strong{display:block}
    .line small{display:block;color:var(--muted);margin-top:3px}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    .notice{
      border:1px solid rgba(218,97,255,.38);
      border-radius:8px;
      background:rgba(0,0,0,.36);
      padding:13px;
      color:var(--muted);
      margin:12px 0;
    }
    .prelaunch-banner{
      position:absolute;
      z-index:21;
      left:50%;
      bottom:2.2%;
      transform:translateX(-50%);
      width:min(760px,88%);
      border:1px solid rgba(245,188,255,.62);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(48,12,70,.86),rgba(11,4,16,.92));
      box-shadow:0 0 22px rgba(183,60,255,.34);
      padding:10px 14px;
      text-align:center;
      color:white;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.03em;
      pointer-events:none;
    }
    .prelaunch-banner span{color:var(--violet-2)}
    .account-tabs{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
      margin:14px 0;
    }
    .account-tabs button{
      border:1px solid rgba(218,97,255,.45);
      border-radius:8px;
      background:rgba(0,0,0,.38);
      color:white;
      padding:10px;
      font-weight:800;
      text-align:left;
    }
    .account-card{
      border:1px solid rgba(218,97,255,.34);
      border-radius:8px;
      background:rgba(0,0,0,.34);
      padding:12px;
    }
    .account-card strong{display:block;text-transform:uppercase}
    .account-card small{display:block;color:var(--muted);margin-top:4px;line-height:1.35}
    .vote-detail{
      position:absolute;
      left:6%;
      right:6%;
      top:15%;
      z-index:4;
      border:1px solid rgba(218,97,255,.72);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(9,5,15,.94),rgba(5,3,8,.96));
      box-shadow:0 0 30px rgba(183,60,255,.38);
      padding:22px;
    }
    .vote-detail h1{
      margin:0;
      font-size:clamp(24px,4vw,58px);
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .vote-detail h1 span{color:var(--violet-2)}
    .vote-detail p{margin:8px 0 18px;color:var(--muted);font-weight:700}
    .vote-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }
    .vote-card{
      border:1px solid rgba(218,97,255,.48);
      border-radius:8px;
      background:rgba(0,0,0,.48);
      padding:10px;
      min-height:220px;
      display:grid;
      gap:8px;
      align-content:space-between;
      overflow:hidden;
    }
    .vote-card img{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:6px;
      border:1px solid rgba(218,97,255,.35);
      box-shadow:0 0 14px rgba(183,60,255,.22);
    }
    .vote-card strong{
      display:block;
      text-transform:uppercase;
      letter-spacing:.03em;
      font-size:18px;
    }
    .vote-card small{display:block;color:var(--muted);line-height:1.35}
    .vote-button{
      border:0;
      border-radius:8px;
      padding:10px 12px;
      color:white;
      background:linear-gradient(180deg,#d463ff,#8e26db);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.03em;
    }
    .vote-button.active{
      background:linear-gradient(180deg,#f0b4ff,#a527f0);
      box-shadow:0 0 18px rgba(224,105,255,.64);
    }
    .vote-back{
      margin-bottom:14px;
      border:1px solid rgba(218,97,255,.7);
      border-radius:8px;
      background:rgba(0,0,0,.42);
      color:white;
      padding:10px 14px;
      font-weight:800;
    }
    .loyalty-detail{
      position:absolute;
      left:6%;
      right:6%;
      top:14%;
      z-index:4;
      border:1px solid rgba(218,97,255,.72);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(9,5,15,.95),rgba(5,3,8,.97));
      box-shadow:0 0 30px rgba(183,60,255,.38);
      padding:22px;
    }
    .loyalty-detail h1{
      margin:0;
      font-size:clamp(28px,4.3vw,64px);
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .loyalty-detail h1 span{color:var(--violet-2)}
    .loyalty-lead{color:var(--muted);font-weight:800;margin:8px 0 18px}
    .loyalty-grid{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:14px;
    }
    .loyalty-cards{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .loyalty-card{
      border:1px solid rgba(218,97,255,.42);
      border-radius:8px;
      background:rgba(0,0,0,.42);
      padding:13px;
    }
    .loyalty-card strong{
      display:block;
      text-transform:uppercase;
      letter-spacing:.03em;
      margin-bottom:6px;
    }
    .loyalty-card small{display:block;color:var(--muted);line-height:1.35}
    .loyalty-card .big{
      color:var(--violet-2);
      font-size:34px;
      font-weight:900;
      line-height:1;
      margin:8px 0;
    }
    .loyalty-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    .votes-overview{
      position:absolute;
      left:5.8%;
      right:5.8%;
      top:15%;
      z-index:4;
      border:1px solid rgba(218,97,255,.72);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(9,5,15,.94),rgba(5,3,8,.96));
      box-shadow:0 0 30px rgba(183,60,255,.38);
      padding:22px;
    }
    .votes-overview h1{
      margin:0;
      font-size:clamp(28px,4.2vw,64px);
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .votes-overview h1 span{color:var(--violet-2)}
    .votes-overview p{color:var(--muted);font-weight:800;margin:8px 0 18px}
    .votes-overview-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }
    .votes-overview-card{
      border:1px solid rgba(218,97,255,.48);
      border-radius:8px;
      background:rgba(0,0,0,.48);
      padding:10px;
      display:grid;
      gap:8px;
      align-content:space-between;
      min-height:280px;
    }
    .votes-overview-card img{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:6px;
      border:1px solid rgba(218,97,255,.35);
    }
    .votes-overview-card strong{
      text-transform:uppercase;
      letter-spacing:.03em;
      font-size:18px;
    }
    .votes-overview-card small{color:var(--muted);line-height:1.35}
    .contact-detail{
      position:absolute;
      left:7%;
      right:7%;
      top:16%;
      z-index:4;
      display:grid;
      grid-template-columns:1fr 1.15fr;
      gap:18px;
      border:1px solid rgba(218,97,255,.72);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(9,5,15,.95),rgba(5,3,8,.97));
      box-shadow:0 0 30px rgba(183,60,255,.38);
      padding:22px;
    }
    .contact-detail h1{
      margin:0;
      font-size:clamp(28px,4.2vw,62px);
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .contact-detail h1 span{color:var(--violet-2)}
    .contact-detail p{color:var(--muted);font-weight:700;line-height:1.45}
    .contact-panel{
      border:1px solid rgba(218,97,255,.4);
      border-radius:8px;
      background:rgba(0,0,0,.36);
      padding:14px;
    }
    .event-detail,.location-detail{
      position:absolute;
      left:6%;
      right:6%;
      top:14%;
      z-index:4;
      border:1px solid rgba(218,97,255,.72);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(9,5,15,.95),rgba(5,3,8,.97));
      box-shadow:0 0 30px rgba(183,60,255,.38);
      padding:22px;
    }
    .event-detail h1,.location-detail h1{
      margin:0;
      font-size:clamp(28px,4.2vw,62px);
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .event-detail h1 span,.location-detail h1 span{color:var(--violet-2)}
    .event-detail p,.location-detail p{color:var(--muted);font-weight:700;line-height:1.45}
    .event-grid,.location-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:16px;
    }
    .mini-map{
      min-height:260px;
      border:1px solid rgba(218,97,255,.42);
      border-radius:8px;
      background:
        radial-gradient(circle at 62% 47%,rgba(218,97,255,.38) 0 4%,transparent 5%),
        linear-gradient(32deg,transparent 0 45%,rgba(255,255,255,.09) 45% 47%,transparent 47% 100%),
        linear-gradient(122deg,transparent 0 42%,rgba(255,255,255,.07) 42% 44%,transparent 44% 100%),
        rgba(0,0,0,.38);
      display:grid;
      place-items:center;
      text-align:center;
      color:var(--muted);
      padding:14px;
    }
    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(218,97,255,.55);
      border-radius:8px;
      padding:8px 10px;
      background:rgba(0,0,0,.38);
      color:white;
      font-weight:900;
      text-transform:uppercase;
    }
    .alert-red{
      border-color:rgba(255,79,120,.75);
      color:#ffb7c8;
      box-shadow:0 0 14px rgba(255,79,120,.22);
    }
    .floating-action{
      position:absolute;
      z-index:13;
      left:calc(var(--x)*1%);
      top:calc(var(--y)*1%);
      width:calc(var(--w)*1%);
      min-height:calc(var(--h)*1%);
      border:1px solid rgba(245,188,255,.82);
      border-radius:8px;
      background:linear-gradient(180deg,#d463ff,#8e26db);
      color:#fff;
      font-size:clamp(10px,1.05vw,17px);
      font-weight:900;
      text-transform:uppercase;
      box-shadow:0 0 18px rgba(183,60,255,.42);
    }
    .menu-votes-fix{
      position:absolute;
      z-index:13;
      left:41.7%;
      top:33.3%;
      width:16%;
      min-height:10%;
      display:grid;
      place-items:center;
      text-align:left;
      padding:6px 12px;
      background:linear-gradient(90deg,rgba(8,4,12,.96),rgba(8,4,12,.82) 78%,rgba(8,4,12,0));
      color:#fff;
      font-size:clamp(14px,1.7vw,31px);
      font-weight:900;
      line-height:1.05;
      text-transform:uppercase;
      text-shadow:0 0 10px rgba(0,0,0,.86);
    }
    .menu-votes-fix span{color:var(--violet-2)}
    .custom-live-panel{
      position:absolute;
      z-index:14;
      left:47.8%;
      right:4.5%;
      bottom:1.2%;
      border:1px solid rgba(218,97,255,.68);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(10,5,16,.94),rgba(5,3,8,.97));
      box-shadow:0 0 22px rgba(183,60,255,.34);
      padding:10px;
      display:grid;
      gap:8px;
    }
    .custom-live-panel h3{
      margin:0;
      font-size:clamp(12px,1.2vw,20px);
      text-transform:uppercase;
      color:var(--violet-2);
    }
    .custom-live-panel p{
      margin:0;
      color:var(--muted);
      font-size:clamp(10px,.82vw,14px);
      line-height:1.25;
    }
    .custom-chip-row{display:flex;flex-wrap:wrap;gap:5px}
    .custom-chip{
      border:1px solid rgba(218,97,255,.55);
      border-radius:8px;
      background:rgba(0,0,0,.38);
      color:white;
      padding:5px 7px;
      font-size:clamp(9px,.72vw,12px);
      font-weight:800;
    }
    .custom-chip.active{
      background:linear-gradient(180deg,#d463ff,#8e26db);
      box-shadow:0 0 12px rgba(183,60,255,.38);
    }
    .custom-live-footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .cart-live-panel{
      position:absolute;
      z-index:14;
      left:5.5%;
      right:5.5%;
      top:16%;
      border:1px solid rgba(218,97,255,.72);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(9,5,15,.95),rgba(5,3,8,.98));
      box-shadow:0 0 30px rgba(183,60,255,.38);
      padding:16px;
      display:grid;
      grid-template-columns:1.25fr .9fr;
      gap:14px;
      max-height:78%;
      overflow:auto;
    }
    .cart-live-panel h3{
      margin:0 0 8px;
      color:var(--violet-2);
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .cart-row{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:center;
      border:1px solid rgba(218,97,255,.34);
      border-radius:8px;
      background:rgba(0,0,0,.36);
      padding:10px;
      margin-bottom:8px;
    }
    .cart-row strong,.cart-row small{display:block}
    .cart-row small{color:var(--muted);line-height:1.3}

    function handle(action){
      const [type,...rest] = action.split(':');
      const value = rest.join(':');
      if(type === 'go') return go(value);
      if(type === 'add') return addProduct(value);
      if(type === 'formula') return startFormula(value);
      if(type === 'detail') return openProductDetail(value);
      if(type === 'base') return setBase(value);
      if(type === 'size') return setSize(value);
      if(type === 'ingredient') return toggleIngredient(value);
      if(type === 'custom') return addCustom();
      if(type === 'vote') return go(`vote-${value}s`);
      if(type === 'modal') return openModal(value);
      if(type === 'toast') return toast(value);
      if(type === 'slot') return setSlot(value);
      if(type === 'payment') return setPayment(value);
      if(type === 'maps') return openMapsRoute();
      if(type === 'waze') return openWazeRoute();
    }

              <div class="slot-options">
                ${['18:30','19:00','19:30','20:00'].map(slot => `
                  <button class="${state.slot === slot ? 'active' : ''}" type="button" onclick="setSlot('${slot}')">
                    <span>Aujourd'hui</span><strong>${slot}</strong>
                  </button>
                `).join('')}
              </div>
            </div>
            <div class="cart-section">
              <h3>Mode de paiement</h3>
              <div class="pay-options">
                <button class="${state.payment === 'online' ? 'active' : ''}" type="button" onclick="setPayment('online')">CB en ligne Stripe <small>Simulation securisee</small></button>
                <button class="${state.payment === 'cash' ? 'active' : ''}" type="button" onclick="setPayment('cash')">Especes au retrait <small>Paiement au camion</small></button>
                <button class="${state.payment === 'terminal' ? 'active' : ''}" type="button" onclick="setPayment('terminal')">CB au camion via Stripe Terminal <small>Simulation terminal</small></button>
              </div>
            </div>
            <div class="actions">
              <button class="secondary" type="button" onclick="go('menu')">Revenir au menu</button>
              <button class="primary" type="button" onclick="validateCart()">Valider panier</button>
            </div>
          </div>
        </section>`;
    }

    function selectedMarkers(page){
      return page.hotspots.filter(spot => {
        const [type,...rest] = spot.action.split(':');
        const value = rest.join(':');
        if(type === 'base') return state.custom.base === value;
        if(type === 'size') return state.custom.size === value;
        if(type === 'ingredient') return state.custom.ingredients.includes(value);
        if(type === 'slot') return state.slot === value;
        if(type === 'payment') return state.payment === value || (state.payment === 'cash' && value === 'place');
        return false;
      }).map(spot => ({
        ...spot,
        mx: spot.marker?.x ?? spot.x,
        my: spot.marker?.y ?? spot.y,
        mw: spot.marker?.w ?? spot.w,
        mh: spot.marker?.h ?? spot.h
      }));
    }

    function go(page){
      state.page = page;
      closeModal();
      render();
      window.scrollTo({top:0,left:0,behavior:'smooth'});
    }

    function addProduct(key){
      if(prelaunchBlocked('commande')) return;
      const product = products[key];
      if(!product) return;
      if(state.formulaFlow && productCategories[key]){
        return addFormulaChoice(key, product);
      }
      const found = state.cart.find(item => item.key === key);
      if(found) found.qty += 1;
      else state.cart.push({...product,key,qty:1});
      toast(`${product.name} ajoute au panier`);
    }

    function openProductDetail(key){
      state.currentProduct = key;
      openModal('product');
    }

    function startFormula(key){
      if(prelaunchBlocked('commande')) return;
      const plan = formulaPlans[key];
      if(!plan) return;
      state.formulaFlow = {
        key,
        label:plan.label,
        price:plan.price,
        steps:{...plan.steps},
        selected:{pizza:[],boisson:[],dessert:[]}
      };
      go('classiques');
      toast(`${plan.label} : choisissez ${plan.steps.pizza} pizza${plan.steps.pizza > 1 ? 's' : ''}`);
    }

    function addFormulaChoice(key, product){
      const category = productCategories[key];
      const flow = state.formulaFlow;
      const expected = expectedFormulaStep(flow);
      if(category !== expected){
        toast(`Pour cette formule, choisissez d'abord ${stepLabel(expected)}.`);
        go(pageForStep(expected));
        return;
      }
      if(flow.selected[category].length >= flow.steps[category]){
        return advanceFormula();
      }
      flow.selected[category].push(product.name);
      const remaining = flow.steps[category] - flow.selected[category].length;
      if(remaining > 0){
        toast(`${product.name} choisi. Encore ${remaining} ${stepLabel(category)}.`);
        return;
      }
      advanceFormula();
    }

    function expectedFormulaStep(flow){
      if(!flow) return null;
      if(flow.selected.pizza.length < flow.steps.pizza) return 'pizza';
      if(flow.selected.boisson.length < flow.steps.boisson) return 'boisson';
      if(flow.selected.dessert.length < flow.steps.dessert) return 'dessert';
      return 'done';
    }

    function advanceFormula(){
      const flow = state.formulaFlow;
      const next = expectedFormulaStep(flow);
      if(next === 'done') return completeFormula();
      go(pageForStep(next));
      const remaining = flow.steps[next] - flow.selected[next].length;
      toast(`${flow.label} : choisissez ${remaining} ${stepLabel(next)}.`);
    }

    function completeFormula(){
      const flow = state.formulaFlow;
      const desc = [
        `${flow.selected.pizza.length} pizza(s) : ${flow.selected.pizza.join(', ')}`,
        `${flow.selected.boisson.length} boisson(s) : ${flow.selected.boisson.join(', ')}`
      ];
      if(flow.steps.dessert > 0) desc.push(`${flow.selected.dessert.length} dessert(s) : ${flow.selected.dessert.join(', ')}`);
      state.cart.push({key:flow.key,name:flow.label,price:flow.price,desc:desc.join(' | '),qty:1,allergens:'Selon les produits choisis : gluten, lait et autres allergenes possibles.'});
      state.formulaFlow = null;
      go('panier');
      toast(`${flow.label} complete ajoutee au panier`);
    }

    function pageForStep(step){
      return step === 'pizza' ? 'classiques' : step === 'boisson' ? 'boissons' : 'desserts';
    }

    function stepLabel(step){
      return step === 'pizza' ? 'pizza' : step === 'boisson' ? 'boisson' : 'dessert';
    }

    function addCustom(){
      if(prelaunchBlocked('commande')) return;
      const item = {
        name:`Pizza personnalisee ${state.custom.size}`,
        price:customPrice(),
        desc:`Base ${state.custom.base}. ${customSizeRatios[state.custom.size]}. Ingredients : ${state.custom.ingredients.join(', ') || 'a choisir'}.`,
        key:'custom',
        allergens:customAllergenSummary(),
        qty:1
      };
      state.cart.push(item);
      toast('Pizza personnalisee ajoutee au panier');
    }

    function customPrice(){
      const included = 4;
      const extraCount = Math.max(0, state.custom.ingredients.length - included);
      const sizeExtra = state.custom.size === 'XL' ? 0.50 : state.custom.size === 'S' ? -0.50 : 0;
      return customBasePrices[state.custom.size] + extraCount * 0.80 + sizeExtra;
    }

    function customAllergenSummary(){
      const allergens = new Set(['gluten']);
      state.custom.ingredients.forEach(name => {
        const info = customAllergens[name];
        if(!info || info.includes('aucun')) return;
        info.split(',').forEach(item => allergens.add(item.trim()));
      });
      return Array.from(allergens).join(', ');
    }

    function setBase(value){
      state.custom.base = value;
      render();
      toast(`Base choisie : ${value}`);
    }

    function setSize(value){
      state.custom.size = value;
      render();
      toast(`Taille choisie : ${value}`);
    }

    function toggleIngredient(value){
      const list = state.custom.ingredients;
      const index = list.indexOf(value);
      if(index >= 0){
        list.splice(index,1);
        render();
        toast(`${value} retire`);
      }else{
        list.push(value);
        render();
        toast(`${value} ajoute`);
      }
    }

    function setSlot(value){
      state.slot = value;
      render();
      toast(`Creneau de retrait choisi : ${value}`);
    }

    function setPayment(value){
      if(value === 'place') value = 'cash';
      state.payment = value;
      render();
      toast(`Mode choisi : ${paymentLabel()}`);
    }

    function updateQty(index, delta){
      const item = state.cart[index];
      if(!item) return;
      item.qty += delta;
      if(item.qty <= 0) state.cart.splice(index,1);
      render();
      toast('Panier mis a jour');
    }

    function removeCartItem(index){
      const item = state.cart[index];
      if(!item) return;
      state.cart.splice(index,1);
      render();
      toast(`${item.name} supprime du panier`);
    }

    function setSpecialRequest(value){
      state.specialRequest = value;
    }

    function setAllergensAccepted(value){
      state.allergensAccepted = value;
      render();
    }

    function validateCart(){
      if(prelaunchBlocked('paiement')) return;
      if(!state.cart.length){
        toast('Ajoutez au moins un produit avant de valider');
        return;
      }
      if(!state.allergensAccepted){
        toast('Veuillez cocher la prise de connaissance des allergenes');
        return;
      }
      openModal('confirmation');
    }

    function cartSubtotal(){
      return state.cart.reduce((sum,item)=>sum + item.price * item.qty,0);
    }

    function cartPrepFee(){
      return state.cart.length ? 1.50 : 0;
    }

    function cartTotal(){
      return cartSubtotal() + cartPrepFee();
    }

    function paymentLabel(){
      return {
        online:'CB en ligne Stripe',
        cash:'Especes au retrait',
        terminal:'CB au camion via Stripe Terminal'
      }[state.payment] || 'Paiement fictif';
    }

    function cartItemAllergens(item){
      if(item.allergens) return item.allergens;
      const detail = productDetails[item.key] || pizzaDetails[item.key];
      return detail?.allergens || 'Demandez la liste complete a notre equipe.';
    }

    function cartAllergenSummary(){
      if(!state.cart.length) return 'Aucun produit dans le panier pour le moment.';
      const values = new Set();
      state.cart.forEach(item => {
        cartItemAllergens(item).split(',').forEach(value => {
          const clean = value.trim().replace(/\.$/,'');
          if(clean) values.add(clean);
        });
      });
      return Array.from(values).join(', ') + '.';
    }

    function recordVote(kind, productName){
      state.votes[kind] = productName;
      render();
      toast(`Vote enregistre en simulation : ${productName}`);
    }

    function leaveReview(){
      if(PRELAUNCH_MODE){
        toast('Avis bloques pendant le pre-lancement.');
        return;
      }
      if(!state.loggedIn){
        toast('Connectez-vous pour laisser un avis.');
        openModal('account');
        return;

        toast('Avis reserve aux clients connectes ayant commande.');

      toast('Avis enregistre en simulation.');

      if(!state.loggedIn){

        openModal('account');
        return;

      if(state.loyaltyPoints < points){
        toast(`Solde insuffisant : ${points} points requis.`);

      toast(`Avantage simule : ${reward}. Un seul avantage par commande.`);

      const box = document.getElementById('toast');

          <label class="field">Demande particuliere<textarea placeholder="Horaires, allergenes, acces, organisation..."></textarea></label>
        </div>
        <div class="actions"><button class="primary" type="button" onclick="toast('Demande de devis evenement envoyee en simulation');closeModal()">Envoyer la demande</button></div>`;
      if(kind === 'contact') return `
        <div class="grid two">
          <label class="field">Nom<input placeholder="Votre nom"></label>
          <label class="field">Prenom<input placeholder="Votre prenom"></label>
          <label class="field">Email<input type="email" placeholder="vous@email.fr"></label>
          <label class="field">Telephone<input placeholder="06 00 00 00 00"></label>
        </div>
        <label class="field" style="margin-top:12px">Type de demande<select>
          <option>Demande generale</option>
          <option>Demande evenement prive</option>
          <option>Question commande</option>
          <option>Probleme de paiement</option>
          <option>Autre demande</option>
        </select></label>
        <label class="field" style="margin-top:12px">Message<textarea placeholder="Votre message"></textarea></label>
        <div class="notice alert-red">Probleme de paiement : future alerte rouge admin, sans vraie connexion pour l'instant.</div>
        <div class="actions"><button class="primary" type="button" onclick="toast('Message envoye en simulation');closeModal()">Envoyer</button></div>`;
      if(kind === 'callback') return `
        <div class="notice">Demande de rappel simulee. Dans la vraie version, cette demande pourra envoyer une notification SMS/email a Pizza Baladzo.</div>
        <div class="grid two">
          <label class="field">Nom<input placeholder="Votre nom"></label>
          <label class="field">Telephone<input placeholder="06 00 00 00 00"></label>
        </div>
        <label class="field" style="margin-top:12px">Moment prefere<textarea placeholder="Matin, apres-midi, soir..."></textarea></label>
        <div class="actions"><button class="primary" type="button" onclick="toast('Demande de rappel enregistree sous 24 h');closeModal()">Valider le rappel</button></div>`;
      if(kind === 'planning') return `
        <div class="notice">Planning simule pour la preview. Plus tard, il pourra etre gere depuis l'administration.</div>
        <div class="list">
          <div class="line"><div><strong>Mardi</strong><small>Saint-Pons-de-Thomieres</small></div><div class="price">18:00 - 22:30</div></div>
          <div class="line"><div><strong>Jeudi</strong><small>Courniou</small></div><div class="price">18:00 - 22:30</div></div>
          <div class="line"><div><strong>Week-end</strong><small>Evenements prives sur devis</small></div><div class="price">Sur demande</div></div>
        </div>
        <div class="actions">
          <button class="primary" type="button" onclick="openModal('quote')">Demander un devis</button>
          <button class="secondary" type="button" onclick="go('trouver');closeModal()">Ou nous trouver</button>
        </div>`;
      if(kind === 'route') return `
        <div class="notice"><strong>Zone de service :</strong> Courniou, Saint-Pons-de-Thomieres et environ 30 minutes autour.</div>
        <div class="notice"><strong>Position simulee :</strong> Place du Foirail, 34220 Saint-Pons-de-Thomieres.</div>
        <div class="actions">
          <button class="primary" type="button" onclick="openMapsRoute()">Google Maps</button>
          <button class="secondary" type="button" onclick="openWazeRoute()">Waze</button>
          <button class="secondary" type="button" onclick="openModal('contact')">Nous contacter</button>
        </div>`;
      if(kind === 'idea') return `
        <label class="field">Votre idee gourmande<textarea placeholder="Une pizza, un dessert, une boisson..."></textarea></label>
        <div class="actions"><button class="primary" onclick="toast('Idee gourmande enregistree en simulation');closeModal()">Proposer mon idee</button></div>`;
      if(kind === 'guestOrder') return `
        <div class="notice"><strong>Commande rapide sans compte.</strong><br>Vos informations ne seront pas enregistrées comme compte client. Elles servent uniquement à identifier votre commande et à vous prévenir par SMS lorsqu’elle est prête.</div>
        <div class="grid two">
          <label class="field">Prenom<input placeholder="Votre prenom"></label>
          <label class="field">Nom<input placeholder="Votre nom"></label>
          <label class="field">Telephone<input placeholder="06 00 00 00 00"></label>
          <label class="field">Email facultatif<input type="email" placeholder="vous@email.fr"></label>
          <label class="field">Creneau de retrait<select onchange="setSlot(this.value)">
            <option value="18:30">Aujourd'hui 18:30</option>
            <option value="19:00" selected>Aujourd'hui 19:00</option>
            <option value="19:30">Aujourd'hui 19:30</option>
            <option value="20:00">Aujourd'hui 20:00</option>
          </select></label>
          <label class="field">Reference QR<input value="QR-PREVIEW-001"></label>
        </div>
        <div class="notice"><strong>Limites client invite :</strong><br>Pas de fidelite, pas d'historique, pas d'avis, pas de promotions personnalisees, pas de votes connectes.</div>
        <div class="actions">
          <button class="primary" type="button" onclick="submitGuestOrder()">Continuer sans compte</button>
          <button class="secondary" type="button" onclick="openModal('signup')">Creer un compte</button>
        </div>`;
      if(kind === 'guestOrderConfirm') return `
        <div class="notice">Commande invitee simulee. En vraie version, le QR code ouvrira directement ce formulaire pour identifier la commande sans creer de compte.</div>
        <div class="line"><div><strong>Client invite</strong><small>Sans fidelite, sans historique, sans avis et sans promotions personnalisees.</small></div><div class="price">${state.slot}</div></div>
        <div class="actions"><button class="primary" type="button" onclick="go('menu');closeModal()">Voir le menu</button><button class="secondary" type="button" onclick="openModal('account')">Se connecter</button></div>`;
      if(kind === 'payment') return paymentContent();
      if(kind === 'confirmation') return confirmationContent();
      return '';
    }

    function accountSection(items, note){
      const cards = items.map(item => {
        const title = item[0];
        const text = item[1];
        return '<div class="account-card"><strong>' + title + '</strong><small>' + text + '</small></div>';
      }).join('');
      return `
        <div class="notice">${note}</div>
        <div class="grid">${cards}</div>
        <div class="actions"><button class="secondary" type="button" onclick="openModal('account')">Retour compte</button></div>`;
    }

    function loginClient(){
      state.loggedIn = true;
      toast('Connexion client simulee');
      openModal('account');
    }

    function logoutClient(){
      state.loggedIn = false;
      toast('Deconnexion simulee');
      openModal('account');
    }

    function submitGuestOrder(){
      if(prelaunchBlocked('commande')) return;
      openModal('guestOrderConfirm');
    }

    function paymentContent(){
      const lines = state.cart.length ? state.cart.map(item => `
        <div class="line">
          <div><strong>${item.name}</strong><small>${item.desc}</small></div>
          <div class="price">${item.qty} x ${format(item.price)}</div>
        </div>`).join('') : '<div class="notice">Le panier est vide pour le moment. Ajoutez une pizza depuis le menu.</div>';
      return `
        <div class="list">${lines}</div>
        <div class="notice"><strong>Creneau :</strong> aujourd'hui ${state.slot}<br><strong>Paiement :</strong> ${paymentLabel()}<br><strong>Allergenes :</strong> ${cartAllergenSummary()}</div>
        <div class="line"><strong>Total TTC</strong><div class="price">${format(cartTotal())}</div></div>
        <label class="allergen-check">
          <input type="checkbox" ${state.allergensAccepted ? 'checked' : ''} onchange="setAllergensAccepted(this.checked)">
          <span>J'ai pris connaissance des informations allergenes. Obligatoire pour valider.</span>
        </label>
        <div class="actions">
          <button class="primary" onclick="validateCart()">Valider le paiement fictif</button>
          <button class="secondary" onclick="go('menu')">Continuer mes achats</button>
        </div>`;
    }

    function confirmationContent(){
      const lines = state.cart.map(item => `
        <div class="line">
          <div><strong>${item.name}</strong><small>${item.qty} article(s)</small></div>
          <div class="price">${format(item.price * item.qty)}</div>
        </div>`).join('');
      return `
        <div class="notice">Commande validee en simulation. Aucun paiement reel, aucune carte bancaire et aucune donnee client ne sont envoyes.</div>
        <div class="list">${lines}</div>
        <div class="notice">
          <strong>Creneau de retrait :</strong> aujourd'hui ${state.slot}<br>
          <strong>Mode de paiement :</strong> ${paymentLabel()}<br>
          <strong>Demandes particulieres :</strong> ${state.specialRequest || 'Aucune demande particuliere.'}<br>
          <strong>Allergenes vus :</strong> oui
        </div>
        <div class="line"><strong>Total TTC</strong><div class="price">${format(cartTotal())}</div></div>
        <div class="actions">
          <button class="primary" type="button" onclick="closeModal();toast('Confirmation affichee en simulation')">Fermer</button>
          <button class="secondary" type="button" onclick="go('menu')">Retour au menu</button>
        </div>`;
    }

    function format(value){
      return value.toLocaleString('fr-FR',{style:'currency',currency:'EUR'});
    }

    function openMapsRoute(){
      const url = 'https://www.google.com/maps/dir/?api=1&destination=Place%20du%20Foirail%2C%2034220%20Saint-Pons-de-Thomieres';
      window.open(url, '_blank', 'noopener,noreferrer');
      toast('Itineraire Google Maps ouvert en simulation');
    }

    function openWazeRoute(){
      const url = 'https://waze.com/ul?q=Place%20du%20Foirail%2C%2034220%20Saint-Pons-de-Thomieres&navigate=yes';
      window.open(url, '_blank', 'noopener,noreferrer');
      toast('Itineraire Waze ouvert en simulation');
    }

    window.addEventListener('keydown', event => {
      if(event.key === 'Escape') closeModal();
    });
    document.getElementById('modalBackdrop').addEventListener('click', event => {
      if(event.target.id === 'modalBackdrop') closeModal();
    });

    const start = location.hash.replace('#','');
    if(pageData[start]) state.page = start;
    render();
  </script>
</body>
</html>
